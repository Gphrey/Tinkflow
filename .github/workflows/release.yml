name: 'Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            rust_target: ''
          - platform: 'ubuntu-22.04'
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    env:
      CCACHE_DISABLE: 1
      SOURCE_DATE_EPOCH: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # Linux system dependencies for Tauri + audio (cpal/ALSA)
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libclang-dev \
            cmake

      # macOS: install Rust target for cross-compilation
      - name: Install Rust target (macOS)
        if: matrix.platform == 'macos-latest' && matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      # macOS: install CMake for whisper-rs-sys native compilation
      - name: Install CMake (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install cmake

      # Windows: install Vulkan SDK for whisper-rs Vulkan feature
      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1.0.0
        with:
          vulkan_version: 1.3.296.0
          optional_components: com.lunarg.vulkan.vma
          install_runtime: true
          cache: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tinkflow/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: ./tinkflow
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './tinkflow'
          tagName: ${{ github.ref_name }}
          releaseName: 'Tinkflow ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install Tinkflow for your platform.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
